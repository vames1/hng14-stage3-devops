version: '3.8'

volumes:
  HNG-nginx-logs:
  nextcloud-data:

services:
  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    restart: unless-stopped

  detector:
    build: ./detector
    container_name: hng-detector
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    depends_on:
      - nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    cap_add:
      - NET_ADMIN
    network_mode: host
